<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Sign in to Kaleb Ez Tracker — your personal finance dashboard.">
    <meta name="theme-color" content="#6366f1">
    <title>Login - Kaleb Ez Tracker</title>
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- ICONS -->
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icons/icon-512x512.png">

    <!-- Config -->
    <script src="js/config.js"></script>
    <script src="js/notifications.js"></script>
    <script src="js/auth.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* ===== BUBBLES BACKGROUND ===== */
        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: floatBubble 20s infinite ease-in-out;
        }

        .bubble-1 {
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, #a855f7, #7c3aed);
            top: -150px;
            left: -150px;
            animation-duration: 25s;
        }

        .bubble-2 {
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, #ec489a, #db2777);
            bottom: -200px;
            right: -200px;
            animation-duration: 30s;
            animation-delay: 2s;
        }

        .bubble-3 {
            width: 250px;
            height: 250px;
            background: radial-gradient(circle, #6366f1, #4f46e5);
            top: 40%;
            left: -100px;
            animation-duration: 18s;
            animation-delay: 5s;
        }

        .bubble-4 {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, #8b5cf6, #6d28d9);
            bottom: 15%;
            right: -120px;
            animation-duration: 22s;
            animation-delay: 1s;
        }

        .bubble-5 {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #c084fc, #a855f7);
            top: 15%;
            right: 5%;
            animation-duration: 15s;
            animation-delay: 3s;
        }

        .bubble-6 {
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, #f472b6, #ec489a);
            bottom: 25%;
            left: 5%;
            animation-duration: 20s;
            animation-delay: 7s;
        }

        .bubble-7 {
            width: 150px;
            height: 150px;
            background: radial-gradient(circle, #818cf8, #6366f1);
            top: 70%;
            right: 15%;
            animation-duration: 12s;
            animation-delay: 4s;
        }

        .bubble-8 {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, #d8b4fe, #a855f7);
            top: -100px;
            right: -80px;
            animation-duration: 35s;
            animation-delay: 0s;
        }

        @keyframes floatBubble {

            0%,
            100% {
                transform: translateY(0) translateX(0) scale(1);
            }

            25% {
                transform: translateY(-40px) translateX(25px) scale(1.05);
            }

            50% {
                transform: translateY(30px) translateX(-20px) scale(0.98);
            }

            75% {
                transform: translateY(-20px) translateX(15px) scale(1.02);
            }
        }

        .login-container {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s ease;
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .logo p {
            color: #6b7280;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
            background: #f3f4f6;
            padding: 4px;
            border-radius: 60px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            color: #6b7280;
        }

        .tab.active {
            background: #6366f1;
            color: white;
            box-shadow: 0 2px 8px rgba(99, 102, 241, 0.3);
        }

        .form {
            display: none;
        }

        .form.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
            z-index: 1;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: #f9fafb;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0;
            font-size: 13px;
        }

        .checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .checkbox input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6366f1;
        }

        .forgot {
            color: #6366f1;
            text-decoration: none;
        }

        .forgot:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            color: #ef4444;
            margin: 16px 0;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 32px 24px;
            }

            .logo h1 {
                font-size: 24px;
            }

            .features {
                grid-template-columns: repeat(2, 1fr);
            }

            .bubble-1,
            .bubble-2,
            .bubble-3,
            .bubble-4,
            .bubble-5,
            .bubble-6,
            .bubble-7,
            .bubble-8 {
                opacity: 0.1;
            }

        }
    </style>
</head>

<body>
    <!-- Colorful Bubbles Background -->
    <div class="bubbles">
        <div class="bubble bubble-1"></div>
        <div class="bubble bubble-2"></div>
        <div class="bubble bubble-3"></div>
        <div class="bubble bubble-4"></div>
        <div class="bubble bubble-5"></div>
        <div class="bubble bubble-6"></div>
        <div class="bubble bubble-7"></div>
        <div class="bubble bubble-8"></div>
    </div>

    <div class="login-container">
        <div class="logo">
            <h1>Kaleb Ez Tracker</h1>
            <p>Track your finances, achieve your goals</p>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="login">Sign In</button>
            <button class="tab" data-tab="signup">Create Account</button>
        </div>

        <!-- Sign In Form -->
        <div id="loginForm" class="form active">
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email address">
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password">
                </div>
            </div>

            <div class="options">
                <label class="checkbox">
                    <input type="checkbox" id="rememberMe"> Remember me
                </label>
                <a href="#" class="forgot" onclick="showForgotPassword(); return false;">Forgot Password?</a>
            </div>

            <div id="loginError" class="error-message"></div>

            <button class="btn" onclick="handleLogin()">Sign In →</button>
        </div>

        <!-- Sign Up Form -->
        <div id="signupForm" class="form">
            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupName" placeholder="Full name">
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email address">
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Password">
                </div>
            </div>

            <div class="input-group">
                <div class="input-wrapper">
                    <i class="fas fa-check-circle"></i>
                    <input type="password" id="signupConfirmPassword" placeholder="Confirm password">
                </div>
            </div>

            <div id="signupError" class="error-message"></div>

            <button class="btn" onclick="handleSignup()">Create Account →</button>
        </div>
    </div>

    <script>
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
                document.getElementById(tab.dataset.tab + 'Form').classList.add('active');
            });
        });

        // Check if already logged in
        auth.onAuthStateChanged((user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // Check if user has saved session
        function checkSavedSession() {
            const savedEmail = localStorage.getItem('quick_login_email');
            const savedTimestamp = localStorage.getItem('quick_login_timestamp');

            if (savedEmail && savedTimestamp) {
                const daysSince = (Date.now() - parseInt(savedTimestamp)) / (1000 * 60 * 60 * 24);
                if (daysSince < 30) {
                    document.getElementById('loginEmail').value = savedEmail;
                } else {
                    localStorage.removeItem('quick_login_email');
                    localStorage.removeItem('quick_login_timestamp');
                }
            }
        }

        function saveForQuickLogin(email, password) {
            if (confirm('Save your login for quick access next time?')) {
                localStorage.setItem('quick_login_email', email);
                localStorage.setItem('quick_login_password', password);
                localStorage.setItem('quick_login_timestamp', Date.now().toString());
                alert('Saved! Next time you can login quickly.');
            }
        }

        async function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const rememberMe = document.getElementById('rememberMe')?.checked || false;
            const errorDiv = document.getElementById('loginError');

            errorDiv.classList.remove('show');
            errorDiv.textContent = '';

            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.classList.add('show');
                return;
            }

            const btn = document.querySelector('#loginForm .btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in...';
            btn.disabled = true;

            try {
                const persistence = rememberMe ?
                    firebase.auth.Auth.Persistence.LOCAL :
                    firebase.auth.Auth.Persistence.SESSION;
                await auth.setPersistence(persistence);
                await auth.signInWithEmailAndPassword(email, password);

                if (rememberMe) {
                    saveForQuickLogin(email, password);
                }

                window.location.href = 'index.html';
            } catch (error) {
                let errorMessage = 'Invalid email or password.';
                if (error.code === 'auth/user-not-found') errorMessage = 'No account found with this email';
                else if (error.code === 'auth/wrong-password') errorMessage = 'Incorrect password';
                else if (error.code === 'auth/too-many-requests') errorMessage = 'Too many attempts. Try again later.';
                errorDiv.textContent = errorMessage;
                errorDiv.classList.add('show');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            checkSavedSession();
            const savedEmail = localStorage.getItem('quick_login_email');
            if (savedEmail) {
                document.getElementById('loginEmail').value = savedEmail;
                document.getElementById('loginPassword').focus();
            }
        });
    </script>
    <script src="js/auth.js"></script>
</body>

</html>
