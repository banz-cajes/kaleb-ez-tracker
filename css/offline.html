<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Kaleb Ez Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, -apple-system, 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .offline-card {
            background: white;
            border-radius: 32px;
            padding: 40px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 12px;
            color: #1f2937;
        }
        p {
            color: #6b7280;
            margin-bottom: 24px;
            line-height: 1.6;
        }
        button {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99,102,241,0.3);
        }
        .features {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .feature {
            font-size: 12px;
            color: #6b7280;
        }
        .feature i {
            color: #6366f1;
            margin-right: 6px;
        }
    </style>
</head>
<body>
    <div class="offline-card">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>You can still view your last saved data, but you need internet to add new transactions or sync.</p>
        <button onclick="location.reload()">
            <i class="fas fa-sync-alt"></i> Retry Connection
        </button>
        <div class="features">
            <div class="feature"><i class="fas fa-eye"></i> View Data</div>
            <div class="feature"><i class="fas fa-chart-line"></i> See Charts</div>
            <div class="feature"><i class="fas fa-sync"></i> Auto-Sync</div>
        </div>
    </div>
    <script>
        // Auto redirect when online
        window.addEventListener('online', () => {
            window.location.href = '/';
        });
    </script>
</body>
</html>
